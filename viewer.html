<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARC3 Run Inspector</title>
  <link rel="stylesheet" href="./static/css/theme.css" />
  <link rel="stylesheet" href="./static/css/app.css" />
  <script>
  (function(){try{var t=localStorage.getItem('arc3-theme');if(t!=='light'&&t!=='dark'){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
  </script>
  <script defer src="./static/js/theme-toggle.js"></script>
</head>
<body>
<nav class="runtabs"><a class="rt-home" href="./">&larr; runs</a><a class="rt-tab active" id="rt-viewer">Viewer</a><a class="rt-tab" id="rt-harness">Harness &amp; prompts</a><button data-theme-toggle class="theme-toggle" style="margin-left:auto;align-self:center"></button></nav>
<style>
.runtabs { position: sticky; top: 0; z-index: 100; display: flex; gap: 6px; align-items: flex-end;
  padding: 10px 16px 0; min-height: 42px; box-sizing: border-box; background: var(--bg);
  border-bottom: 1px solid var(--wash-line); font: 13px system-ui, sans-serif; }
.runtabs .rt-home { margin-right: 12px; padding-bottom: 9px; opacity: .7; text-decoration: none; color: inherit; }
.runtabs .rt-home:hover { opacity: 1; }
.runtabs .rt-tab { padding: 7px 16px; border-radius: 8px 8px 0 0; text-decoration: none; color: inherit;
  opacity: .65; border: 1px solid var(--wash-line); border-bottom: none;
  background: var(--wash); position: relative; top: 1px; }
.runtabs .rt-tab.active { opacity: 1; background: var(--wash-2); font-weight: 600; }
</style>
<script>
(function(){
  const sync = () => {
    document.getElementById("rt-viewer").href = "./viewer.html" + location.hash;
    document.getElementById("rt-harness").href = "./harness.html" + location.hash;
  };
  sync(); window.addEventListener("hashchange", sync);
})();
</script>

  <div id="app">
    <header class="topbar">
      <span class="brand">ARC3 RUN INSPECTOR</span>
      <button id="back" hidden>← All games</button>
      <select id="run-select" aria-label="Run"></select>
      <a class="runs-link" href="./">all runs →</a>
      <span class="crumb" id="crumb">Loading…</span>
      <span class="spacer"></span>
      <span class="crumb">←/→ step · ⇧←/→ turn · space play · L live</span>
    </header>

    <section class="screen" id="overview">
      <div class="totals" id="totals"></div>
      <div class="cards" id="cards"></div>
    </section>

    <section class="screen" id="replay" hidden>
      <div class="pane" id="log-pane">
        <div class="pane-head">Event log<span class="spacer"></span></div>
        <div class="pane-body">
          <table class="log">
            <thead>
              <tr><th>#</th><th>turn</th><th>ty</th><th>Δ</th><th>action &amp; decision</th></tr>
            </thead>
            <tbody id="log-body"></tbody>
          </table>
        </div>
      </div>

      <div class="pane" id="board-pane">
        <div class="pane-head">Board<span class="spacer"></span><span id="board-meta"></span></div>
        <div class="pane-body">
          <div class="board-wrap">
            <canvas id="board-canvas"></canvas>
          </div>
          <div class="board-foot" id="scrub">
            <div class="scrub-banner" id="scrub-banner" hidden>
              <span id="scrub-banner-text"></span>
              <span class="spacer"></span>
              <button id="scrub-return" type="button">▶ Return to live</button>
            </div>
            <div class="scrub">
              <div class="scrub-track">
                <input type="range" id="scrub-slider" min="0" max="0" value="0" />
                <div class="scrub-ticks" id="scrub-ticks"></div>
              </div>
              <div class="scrub-row">
                <span class="transport">
                  <button id="scrub-first" type="button" title="First frame (Home)">⏮</button>
                  <button id="scrub-prev" type="button" title="Previous frame (←)">◀</button>
                  <button id="scrub-play" type="button" title="Play / pause (space)">▶</button>
                  <button id="scrub-next" type="button" title="Next frame (→)">▶|</button>
                  <button id="scrub-last" type="button" title="Latest frame (End)">⏭</button>
                </span>
                <span id="scrub-label">No frames</span>
                <span class="spacer"></span>
                <span class="live-dot" id="scrub-dot">● LIVE</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="pane" id="decision-pane">
        <div class="pane-head">Decision</div>
        <div class="pane-body" id="decision-body"></div>
      </div>
    </section>
  </div>

  <div class="tooltip" id="tooltip" hidden>
    <span class="swatch"></span><span class="label"></span>
  </div>

  <script type="module" src="./static/js/main.js"></script>
</body>
</html>
